services:
  ai-gateway:
    build: .
    ports:
      - "8000:8000"
    environment:
      - AI_PROVIDER=ollama
      - AI_MODEL=gemma3:1b
      - OLLAMA_BASE_URL=http://ollama:11434
      - REQUEST_TIMEOUT_SECONDS=30
      - LOG_LEVEL=INFO
      - SERVICE_VERSION=0.1.0
    depends_on:
      - ollama
    networks:
      - ai-network

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    networks:
      - ai-network

networks:
  ai-network:
    driver: bridge

volumes:
  ollama-data:
